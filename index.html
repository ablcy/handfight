<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手势识别 - 剪刀石头布</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #2d3748;
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .battle-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto 20px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            background: #000;
        }

        .player-section {
            width: 100%;
            position: relative;
            background: #000;
        }

        .player-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 10;
        }

        .video-container {
            position: relative;
            width: 100%;
        }

        video, canvas {
            width: 100%;
            display: block;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .ai-section {
            width: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 180px;
            border-top: 3px solid #667eea;
            position: relative;
        }

        .ai-gesture-display {
            font-size: 6rem;
            transition: transform 0.3s ease;
        }

        .ai-gesture-display.animate {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .vs-divider {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .status-message {
            text-align: center;
            color: #667eea;
            font-size: 1.1rem;
            margin-bottom: 20px;
            min-height: 30px;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            color: white;
        }

        .score-item {
            text-align: center;
        }

        .score-value {
            font-size: 2.5rem;
            font-weight: 700;
            display: block;
        }

        .score-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .result-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px 25px;
            border-radius: 16px;
            text-align: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
            min-width: 200px;
        }

        .result-display.show {
            display: block;
        }

        .result-text {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .gestures-show {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .gesture-item {
            text-align: center;
        }

        .gesture-emoji {
            font-size: 4rem;
            display: block;
        }

        .gesture-label {
            font-size: 1rem;
            margin-top: 10px;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .settings-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            font-weight: 600;
        }

        .settings-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .settings-panel {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .settings-panel.show {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; max-height: 0; }
            to { opacity: 1; max-height: 200px; }
        }

        .settings-title {
            color: #2d3748;
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .slider-container {
            margin-bottom: 10px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 500;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #e2e8f0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .settings-desc {
            color: #718096;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .reset-btn {
            background: #ed8936;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: all 0.3s;
            font-weight: 600;
        }

        .reset-btn:hover {
            background: #dd6b20;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
            color: #667eea;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .score-value {
                font-size: 2rem;
            }

            .result-text {
                font-size: 1.8rem;
            }

            .gesture-emoji {
                font-size: 3rem;
            }
        }

        .footer-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
            text-align: center;
        }

        .changelog-section {
            margin-bottom: 20px;
        }

        .changelog-toggle {
            font-size: 1rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 12px;
            cursor: pointer;
            padding: 10px;
            background: #e2e8f0;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .changelog-toggle:hover {
            background: #cbd5e0;
        }

        .changelog-content {
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            background: #f7fafc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .changelog-item {
            font-size: 0.85rem;
            color: #4a5568;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .changelog-item:last-child {
            margin-bottom: 0;
        }

        .changelog-item strong {
            color: #667eea;
        }

        .version-info {
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }

        .copyright {
            font-size: 0.85rem;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✊✌️🖐️ 手势对战</h1>
        
        <div class="battle-container">
            <div class="player-section">
                <div class="player-label">👤 你</div>
                <div class="video-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                </div>
            </div>
            <div class="vs-divider">⚔️ VS</div>
            <div class="ai-section">
                <div class="player-label">🤖 AI</div>
                <div id="aiGestureDisplay" class="ai-gesture-display">❓</div>
            </div>
        </div>

        <div id="statusMessage" class="status-message">正在加载手势识别...</div>

        <div class="score-board">
            <div class="score-item">
                <span class="score-value" id="userScore">0</span>
                <span class="score-label">你赢了</span>
            </div>
            <div class="score-item">
                <span class="score-value" id="tieScore">0</span>
                <span class="score-label">平局</span>
            </div>
            <div class="score-item">
                <span class="score-value" id="aiScore">0</span>
                <span class="score-label">AI赢了</span>
            </div>
        </div>

        <button class="settings-btn" onclick="toggleSettings()">⚙️ 胜率设置</button>

        <div id="settingsPanel" class="settings-panel">
            <div class="settings-title">AI胜率调节</div>
            <div class="slider-container">
                <div class="slider-label">
                    <span>AI胜率</span>
                    <span><input type="number" id="winRateInput" value="50" min="0" max="100" style="width: 60px; padding: 4px; border: 1px solid #e2e8f0; border-radius: 4px; text-align: center;">%</span>
                </div>
                <input type="range" id="winRateSlider" min="0" max="100" value="50">
            </div>
            <div class="settings-desc">
                • 0% = 你每局必赢<br>
                • 100% = 你每局必输<br>
                • 其他数值 = 随机对战
            </div>
            <button class="reset-btn" onclick="resetScore()">🔄 重置分数</button>
        </div>

        <div class="footer-info">
            <div class="changelog-section">
                <div class="changelog-toggle" onclick="toggleChangelog()">📋 更新日志 <span id="changelogArrow">▼</span></div>
                <div class="changelog-content" id="changelogContent" style="display: none;">
                    <div class="changelog-item"><strong>2026-05-24 21:22</strong> - V0.0.2 裁判固定右下角，更新日志折叠功能</div>
                    <div class="changelog-item"><strong>2026-05-24 21:01</strong> - V0.0.1 移除AI手势轮换动画，大幅提升响应速度</div>
                </div>
            </div>
            <div class="version-info">V0.0.2</div>
            <div class="copyright">© 2026 Li Chengyan. All Rights Reserved.</div>
        </div>
    </div>

    <div id="resultDisplay" class="result-display">
        <div class="gestures-show">
            <div class="gesture-item">
                <span class="gesture-emoji" id="userGesture">✊</span>
                <span class="gesture-label">你</span>
            </div>
            <div class="gesture-item">
                <span class="gesture-emoji">⚔️</span>
                <span class="gesture-label">VS</span>
            </div>
            <div class="gesture-item">
                <span class="gesture-emoji" id="aiGesture">✊</span>
                <span class="gesture-label">AI</span>
            </div>
        </div>
        <div id="resultText" class="result-text">平局！</div>
    </div>

    <script>
        // ============== 全局变量 ==============
        let userScore = 0;
        let aiScore = 0;
        let tieScore = 0;
        let winRate = 50;
        let isPlaying = false;
        let lastGesture = null;
        let gestureStableCount = 0;
        const STABLE_THRESHOLD = 8;
        let currentAIGesture = null;

        // 手势映射表
        const GESTURES = {
            ROCK: 'rock',
            SCISSORS: 'scissors',
            PAPER: 'paper'
        };

        const GESTURE_EMOJI = {
            rock: '✊',
            scissors: '✌️',
            paper: '🖐️'
        };

        // ============== MediaPipe 手势识别模块 ==============
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusMessage = document.getElementById('statusMessage');

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 2 });
                    drawLandmarks(canvasCtx, landmarks, { color: '#FF0000', lineWidth: 1, radius: 3 });
                }

                if (results.multiHandLandmarks.length > 0) {
                    const gesture = detectGesture(results.multiHandLandmarks[0]);
                    if (gesture) {
                        handleGesture(gesture);
                    } else {
                        updateStatus('请做出有效手势（石头/剪刀/布）');
                        resetGestureState();
                    }
                } else {
                    updateStatus('请将手放入摄像头');
                    resetGestureState();
                }
            } else {
                updateStatus('请将手放入摄像头');
                resetGestureState();
            }

            canvasCtx.restore();
        }

        function detectGesture(landmarks) {
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const indexPIP = landmarks[6];
            const middleTip = landmarks[12];
            const middlePIP = landmarks[10];
            const ringTip = landmarks[16];
            const ringPIP = landmarks[14];
            const pinkyTip = landmarks[20];
            const pinkyPIP = landmarks[18];
            const wrist = landmarks[0];

            const indexExtended = indexTip.y < indexPIP.y;
            const middleExtended = middleTip.y < middlePIP.y;
            const ringExtended = ringTip.y < ringPIP.y;
            const pinkyExtended = pinkyTip.y < pinkyPIP.y;

            if (!indexExtended && !middleExtended && !ringExtended && !pinkyExtended) {
                return GESTURES.ROCK;
            }

            if (indexExtended && middleExtended && !ringExtended && !pinkyExtended) {
                return GESTURES.SCISSORS;
            }

            if (indexExtended && middleExtended && ringExtended && pinkyExtended) {
                return GESTURES.PAPER;
            }

            return null;
        }

        function handleGesture(gesture) {
            if (gesture === lastGesture) {
                gestureStableCount++;
                if (gestureStableCount >= STABLE_THRESHOLD && !isPlaying) {
                    playGame(gesture);
                }
            } else {
                lastGesture = gesture;
                gestureStableCount = 1;
            }
            
            const gestureNames = { rock: '石头', scissors: '剪刀', paper: '布' };
            updateStatus(`识别到: ${gestureNames[gesture]}`);
        }

        function resetGestureState() {
            lastGesture = null;
            gestureStableCount = 0;
        }

        function updateStatus(message) {
            statusMessage.textContent = message;
        }

        // ============== 游戏逻辑模块 ==============
        function playGame(userGesture) {
            if (isPlaying) return;
            isPlaying = true;
            
            const aiGesture = generateAIGesture(userGesture);
            currentAIGesture = aiGesture;
            
            const aiDisplay = document.getElementById('aiGestureDisplay');
            aiDisplay.textContent = GESTURE_EMOJI[aiGesture];
            aiDisplay.classList.add('animate');
            setTimeout(() => aiDisplay.classList.remove('animate'), 200);
            
            const result = determineWinner(userGesture, aiGesture);
            updateScore(result);
            showResult(userGesture, aiGesture, result);
            
            setTimeout(() => {
                isPlaying = false;
                resetGestureState();
                resetAIDisplay();
            }, 1200);
        }

        function generateAIGesture(userGesture) {
            const random = Math.random() * 100;
            
            if (winRate === 0) {
                if (userGesture === GESTURES.ROCK) return GESTURES.SCISSORS;
                if (userGesture === GESTURES.SCISSORS) return GESTURES.PAPER;
                if (userGesture === GESTURES.PAPER) return GESTURES.ROCK;
            }
            
            if (winRate === 100) {
                if (userGesture === GESTURES.ROCK) return GESTURES.PAPER;
                if (userGesture === GESTURES.SCISSORS) return GESTURES.ROCK;
                if (userGesture === GESTURES.PAPER) return GESTURES.SCISSORS;
            }
            
            if (random < winRate) {
                if (userGesture === GESTURES.ROCK) return GESTURES.PAPER;
                if (userGesture === GESTURES.SCISSORS) return GESTURES.ROCK;
                if (userGesture === GESTURES.PAPER) return GESTURES.SCISSORS;
            } else {
                if (userGesture === GESTURES.ROCK) return GESTURES.SCISSORS;
                if (userGesture === GESTURES.SCISSORS) return GESTURES.PAPER;
                if (userGesture === GESTURES.PAPER) return GESTURES.ROCK;
            }
            
            const gestures = [GESTURES.ROCK, GESTURES.SCISSORS, GESTURES.PAPER];
            return gestures[Math.floor(Math.random() * 3)];
        }

        function determineWinner(user, ai) {
            if (user === ai) return 'tie';
            
            if ((user === GESTURES.ROCK && ai === GESTURES.SCISSORS) ||
                (user === GESTURES.SCISSORS && ai === GESTURES.PAPER) ||
                (user === GESTURES.PAPER && ai === GESTURES.ROCK)) {
                return 'user';
            }
            
            return 'ai';
        }

        // ============== 计分模块 ==============
        function updateScore(result) {
            if (result === 'user') {
                userScore++;
                document.getElementById('userScore').textContent = userScore;
            } else if (result === 'ai') {
                aiScore++;
                document.getElementById('aiScore').textContent = aiScore;
            } else {
                tieScore++;
                document.getElementById('tieScore').textContent = tieScore;
            }
        }

        function resetScore() {
            userScore = 0;
            aiScore = 0;
            tieScore = 0;
            document.getElementById('userScore').textContent = '0';
            document.getElementById('aiScore').textContent = '0';
            document.getElementById('tieScore').textContent = '0';
        }

        function resetAIDisplay() {
            const aiDisplay = document.getElementById('aiGestureDisplay');
            aiDisplay.textContent = '❓';
        }

        // ============== UI交互模块 ==============
        function showResult(userGesture, aiGesture, result) {
            const resultDisplay = document.getElementById('resultDisplay');
            const resultText = document.getElementById('resultText');
            const userGestureEl = document.getElementById('userGesture');
            const aiGestureEl = document.getElementById('aiGesture');
            
            userGestureEl.textContent = GESTURE_EMOJI[userGesture];
            aiGestureEl.textContent = GESTURE_EMOJI[aiGesture];
            
            if (result === 'user') {
                resultText.textContent = '🎉 你赢了！';
            } else if (result === 'ai') {
                resultText.textContent = '😢 你输了！';
            } else {
                resultText.textContent = '🤝 平局！';
            }
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('show');
        }

        function toggleChangelog() {
            const content = document.getElementById('changelogContent');
            const arrow = document.getElementById('changelogArrow');
            if (content.style.display === 'none') {
                content.style.display = 'block';
                arrow.textContent = '▲';
            } else {
                content.style.display = 'none';
                arrow.textContent = '▼';
            }
        }

        // ============== 初始化模块 ==============
        async function init() {
            try {
                const hands = new Hands({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                    }
                });

                hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.5
                });

                hands.onResults(onResults);

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' }
                });

                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => {
                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;
                    
                    const camera = new Camera(videoElement, {
                        onFrame: async () => {
                            await hands.send({ image: videoElement });
                        },
                        width: 640,
                        height: 480
                    });
                    camera.start();
                    
                    updateStatus('请做出手势开始游戏！');
                };
            } catch (error) {
                console.error('初始化失败:', error);
                updateStatus('无法访问摄像头，请确保已授予权限');
            }
        }

        // ============== 事件监听 ==============
        const slider = document.getElementById('winRateSlider');
        const input = document.getElementById('winRateInput');

        slider.addEventListener('input', (e) => {
            winRate = parseInt(e.target.value);
            input.value = winRate;
        });

        input.addEventListener('input', (e) => {
            let value = parseInt(e.target.value);
            if (isNaN(value)) value = 50;
            if (value < 0) value = 0;
            if (value > 100) value = 100;
            winRate = value;
            slider.value = winRate;
            e.target.value = value;
        });

        input.addEventListener('blur', (e) => {
            let value = parseInt(e.target.value);
            if (isNaN(value)) value = 50;
            if (value < 0) value = 0;
            if (value > 100) value = 100;
            winRate = value;
            slider.value = winRate;
            e.target.value = value;
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
